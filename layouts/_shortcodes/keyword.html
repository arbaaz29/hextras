{{ $icon := .Get "icon" }}
<div class="hx:flex hx:mt-2">
  <span
    class="hx:rounded-full hx:bg-primary-500 hx:dark:bg-primary-400 hx:text-neutral-50 hx:dark:text-neutral-800 hx:px-1.5 hx:py-[1px] hx:text-xs hx:font-normal">
    <span class="hx:flex hx:flex-row hx:items-center">
      {{ if $icon }}
        <span class="hx:mr-1">{{ partial "icon" $icon }}</span>
      {{ end }}
      <span> {{- .Inner | markdownify -}} </span>
    </span>
  </span>
</div>
